version: '3'

vars:
  ITESTS_DIR: .

tasks:
  sync:
    desc: "Install Python dependencies with uv (skip when lockfile unchanged)"
    cmds:
      - |
        if [ ! -f .uv-sync.stamp ] \
          || [ uv.lock -nt .uv-sync.stamp ] \
          || [ pyproject.toml -nt .uv-sync.stamp ]; then
          echo "Syncing dependencies..."
          uv sync --frozen
          touch .uv-sync.stamp
        else
          echo "Dependencies already synced (lockfile unchanged)"
        fi

  test:
    desc: "Run all integration tests"
    deps: [sync]
    cmds:
      - uv run pytest

  test:auth:
    desc: "Run authentication tests only"
    deps: [sync]
    cmds:
      - uv run pytest -m auth

  test:admin:
    desc: "Run admin tests only"
    deps: [sync]
    cmds:
      - uv run pytest -m admin

  test:license:
    desc: "Run license management tests only"
    deps: [sync]
    cmds:
      - uv run pytest -m license

  test:pdf:
    desc: "Run PDF generation tests only"
    deps: [sync]
    cmds:
      - uv run pytest -m pdf

  test:integration:
    desc: "Run tests marked integration"
    deps: [sync]
    cmds:
      - uv run pytest -m integration

  test:cov:
    desc: "Run tests with coverage report"
    deps: [sync]
    cmds:
      - uv run pytest --cov=tests --cov-report=html --cov-report=term -n 0
      - |
        echo ""
        echo "Coverage report generated in htmlcov/index.html"

  test:serial:
    desc: "Run tests in a single process (no xdist)"
    deps: [sync]
    cmds:
      - uv run pytest -n 0

  clean:
    desc: "Clean up generated files"
    cmds:
      - rm -rf .pytest_cache htmlcov .coverage .uv-sync.stamp
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  populate:
    desc: "Register seed users (prefer `task populate` from repo root — starts backend if needed)"
    deps: [sync]
    cmds:
      - uv run python -m tests.populate_users

  populate:licenses:
    desc: "Force licenses for all seed users (backend must be running)"
    deps: [sync]
    cmds:
      - uv run python -m tests.populate_licenses

  check-backend:
    desc: "Check if backend is running"
    cmds:
      - |
        if curl -sf http://localhost:8080/api/v1/health > /dev/null; then
          echo "Backend is running at http://localhost:8080"
        else
          echo "Backend is NOT running at http://localhost:8080"
          echo "Run from repo root: task populate  (starts backend automatically)"
          exit 1
        fi

  default:
    desc: "Show available tasks"
    cmds:
      - task --list
