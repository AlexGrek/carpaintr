version: "3"

vars:
  # Docker Hub images
  HUB_API_IMAGE: "grekodocker/autolab-api"
  HUB_PDF_IMAGE: "grekodocker/autolab-pdf"  # Now uses Playwright (lightweight)
  TAG:
    sh: git rev-parse --short HEAD
  # Helm/Kubernetes
  CHART_PATH: "./autolab-chart/autolab-chart/autolab"
  # Environment configs (dev is default)
  ENV: '{{.ENV | default "dev"}}'
  # Environment-specific settings
  NAMESPACE_dev: "autolab-dev"
  NAMESPACE_staging: "autolab-staging"
  NAMESPACE_prod: "autolab-prod0"
  RELEASE_dev: "autolab-dev"
  RELEASE_staging: "autolab-staging"
  RELEASE_prod: "autolab-prod"
  VALUES_dev: "values-dev.yaml"
  VALUES_staging: "values-staging.yaml"
  VALUES_prod: "values-prod.yaml"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Docker build tasks (amd64 only)
  build:
    desc: Build and push all Docker images (amd64)
    cmds:
      - task: build-backend
      - task: build-pdfgen

  build-backend:
    desc: Build and push backend image (amd64)
    cmds:
      - echo "Building backend image {{.HUB_API_IMAGE}}:{{.TAG}}..."
      - docker build --platform linux/amd64 -t {{.HUB_API_IMAGE}}:{{.TAG}} -t {{.HUB_API_IMAGE}}:latest --push .

  build-pdfgen:
    desc: Build and push Playwright PDF generator image (amd64)
    dir: pdf_backend_playwright
    cmds:
      - echo "Building PDF generator image {{.HUB_PDF_IMAGE}}:{{.TAG}}..."
      - docker build --platform linux/amd64 -t {{.HUB_PDF_IMAGE}}:{{.TAG}} -t {{.HUB_PDF_IMAGE}}:latest --push .

  build-pdfgen-legacy:
    desc: Build legacy WeasyPrint PDF generator Docker image (single arch)
    dir: pdf_backend
    cmds:
      - docker build . -t {{.HUB_PDF_IMAGE}}:{{.TAG}}-legacy

  release:
    desc: Build and push all multi-arch Docker images to Docker Hub
    cmds:
      - task: build

  # Single-architecture build tasks (for local development)
  build-local:
    desc: Build local single-arch images (not pushed)
    cmds:
      - task: build-backend-local
      - task: build-pdfgen-local

  build-backend-local:
    desc: Build backend Docker image for local architecture only
    cmds:
      - docker build . -t {{.HUB_API_IMAGE}}:{{.TAG}} -t {{.HUB_API_IMAGE}}:latest

  build-pdfgen-local:
    desc: Build Playwright PDF generator Docker image for local architecture only
    dir: pdf_backend_playwright
    cmds:
      - docker build . -t {{.HUB_PDF_IMAGE}}:{{.TAG}} -t {{.HUB_PDF_IMAGE}}:latest

  # Helm deployment tasks - Multi-stage
  # Usage: task deploy (defaults to dev)
  # Usage: task deploy ENV=staging
  # Usage: task deploy ENV=prod
  prepull:
    desc: "Pre-pull images onto cluster nodes before deployment (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
    cmds:
      - echo "Pre-pulling {{.HUB_API_IMAGE}}:{{.TAG}} onto cluster..."
      - |
        kubectl run prepull-api-{{.TAG}} \
          --image={{.HUB_API_IMAGE}}:{{.TAG}} \
          --restart=Never \
          --namespace={{.NS}} \
          --command -- /bin/true 2>/dev/null || true
      - kubectl wait --for=condition=complete pod/prepull-api-{{.TAG}} --namespace={{.NS}} --timeout=300s
      - kubectl delete pod prepull-api-{{.TAG}} --namespace={{.NS}} --ignore-not-found=true
      - echo "Pre-pulling {{.HUB_PDF_IMAGE}}:{{.TAG}} onto cluster..."
      - |
        kubectl run prepull-pdf-{{.TAG}} \
          --image={{.HUB_PDF_IMAGE}}:{{.TAG}} \
          --restart=Never \
          --namespace={{.NS}} \
          --command -- /bin/true 2>/dev/null || true
      - kubectl wait --for=condition=complete pod/prepull-pdf-{{.TAG}} --namespace={{.NS}} --timeout=300s
      - kubectl delete pod prepull-pdf-{{.TAG}} --namespace={{.NS}} --ignore-not-found=true
      - echo "Images cached on cluster node. Ready to deploy."

  deploy:
    desc: "Deploy to environment (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      VALS: '{{index . (printf "VALUES_%s" .ENV)}}'
    cmds:
      - task: prepull
        vars:
          ENV: '{{.ENV}}'
      - helm upgrade --install {{.REL}} {{.CHART_PATH}} --namespace {{.NS}} --create-namespace -f {{.CHART_PATH}}/{{.VALS}} --set image.tag={{.TAG}} --set pdfgen.image.tag={{.TAG}}

  deploy-dry-run:
    desc: "Preview Helm deployment (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      VALS: '{{index . (printf "VALUES_%s" .ENV)}}'
    cmds:
      - helm upgrade --install {{.REL}} {{.CHART_PATH}} --namespace {{.NS}} --create-namespace -f {{.CHART_PATH}}/{{.VALS}} --set image.tag={{.TAG}} --set pdfgen.image.tag={{.TAG}} --dry-run

  # Convenience aliases for each environment
  deploy-dev:
    desc: Deploy to development (autolab-dev namespace)
    cmds:
      - task: deploy
        vars:
          ENV: dev

  deploy-staging:
    desc: Deploy to staging (autolab-staging namespace)
    cmds:
      - task: deploy
        vars:
          ENV: staging

  deploy-prod:
    desc: Deploy to production (autolab-prod0 namespace)
    cmds:
      - task: deploy
        vars:
          ENV: prod

  undeploy:
    desc: "Uninstall Helm release (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    cmds:
      - helm uninstall {{.REL}} --namespace {{.NS}}

  redeploy:
    desc: "Build, push, and deploy (ENV=dev|staging|prod, default: dev)"
    cmds:
      - task: release
      - task: deploy

  redeploy-dev:
    desc: Build, push, and deploy to dev
    cmds:
      - task: release
      - task: deploy-dev

  redeploy-staging:
    desc: Build, push, and deploy to staging
    cmds:
      - task: release
      - task: deploy-staging

  redeploy-prod:
    desc: Build, push, and deploy to production
    cmds:
      - task: release
      - task: deploy-prod

  restart:
    desc: "Restart pods (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    cmds:
      - kubectl rollout restart statefulset/{{.REL}}-autolab-api -n {{.NS}}
      - kubectl rollout restart deployment/autolab-pdfgen -n {{.NS}}

  status:
    desc: "Show deployment status (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    cmds:
      - helm status {{.REL}} --namespace {{.NS}}
      - kubectl get pods -n {{.NS}} -l app.kubernetes.io/instance={{.REL}}

  status-all:
    desc: Show deployment status for all environments
    cmds:
      - echo "=== DEV (autolab-dev) ==="
      - kubectl get pods -n autolab-dev 2>/dev/null || echo "No pods in autolab-dev"
      - echo ""
      - echo "=== STAGING (autolab-staging) ==="
      - kubectl get pods -n autolab-staging 2>/dev/null || echo "No pods in autolab-staging"
      - echo ""
      - echo "=== PROD (autolab-prod0) ==="
      - kubectl get pods -n autolab-prod0 2>/dev/null || echo "No pods in autolab-prod0"

  logs:
    desc: "Show logs from API pod (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
    cmds:
      - kubectl logs -n {{.NS}} -l app=autolab-api --tail=100 -f

  logs-pdf:
    desc: "Show logs from PDF generator pod (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
    cmds:
      - kubectl logs -n {{.NS}} -l app=autolab-pdfgen --tail=100 -f

  # Secret management tasks - IMPORTANT: Secrets should be created ONCE and never regenerated
  # This prevents JWT authentication and license validation from breaking on redeploy
  secret-init:
    desc: "Initialize stable secrets for environment (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    cmds:
      - echo "Initializing secrets for {{.ENV}} environment..."
      - ./scripts/init-secrets.sh {{.NS}} {{.REL}}

  secret-init-dev:
    desc: Initialize stable secrets for dev environment
    cmds:
      - task: secret-init
        vars:
          ENV: dev

  secret-init-staging:
    desc: Initialize stable secrets for staging environment
    cmds:
      - task: secret-init
        vars:
          ENV: staging

  secret-init-prod:
    desc: Initialize stable secrets for production environment
    cmds:
      - task: secret-init
        vars:
          ENV: prod

  secret-create:
    desc: "DEPRECATED - Use secret-init instead. Creates secret (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      JWT_SECRET:
        sh: openssl rand -base64 32
      LICENSE_SECRET:
        sh: openssl rand -base64 32
    cmds:
      - |
        echo "⚠️  WARNING: This task is deprecated."
        echo "Use 'task secret-init' instead to create stable secrets."
        echo ""
        echo "Creating secret in namespace {{.NS}}..."
      - kubectl create secret generic autolab-api-secret --namespace {{.NS}} --from-literal=SECRET_KEY={{.JWT_SECRET}} --from-literal=SECRET_KEY_LICENSE={{.LICENSE_SECRET}} --from-file=admins.txt=backend-service-rust/admins.txt --dry-run=client -o yaml | kubectl apply -f -
      - echo "Secret created/updated successfully"

  secret-delete:
    desc: "Delete Kubernetes secret (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
    cmds:
      - kubectl delete secret autolab-api-secret --namespace {{.NS}} --ignore-not-found=true

  secret-recreate:
    desc: "Recreate Kubernetes secret (ENV=dev|staging|prod, default: dev)"
    cmds:
      - task: secret-delete
      - task: secret-create

  secret-show:
    desc: "Show current secret values (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
    cmds:
      - echo "Secret in namespace {{.NS}}:"
      - kubectl get secret autolab-api-secret --namespace {{.NS}} -o yaml 2>/dev/null || echo "Secret not found"

  # Helm install tasks using current kubectl context and commit hash
  helm-context:
    desc: Show current kubectl context and commit hash
    cmds:
      - echo "Current kubectl context:" && kubectl config current-context
      - echo "Current commit hash:" && echo {{.TAG}}
      - echo "Backend image:" && echo {{.HUB_API_IMAGE}}:{{.TAG}}
      - echo "PDF image:" && echo {{.HUB_PDF_IMAGE}}:{{.TAG}}

  helm-install:
    desc: "Install with current kubectl context and commit hash (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      VALS: '{{index . (printf "VALUES_%s" .ENV)}}'
      CONTEXT:
        sh: kubectl config current-context
    cmds:
      - echo "Installing to context {{.CONTEXT}} with commit {{.TAG}}"
      - helm install {{.REL}} {{.CHART_PATH}} --namespace {{.NS}} --create-namespace -f {{.CHART_PATH}}/{{.VALS}} --set image.tag={{.TAG}} --set pdfgen.image.tag={{.TAG}} --kube-context={{.CONTEXT}}

  helm-upgrade:
    desc: "Upgrade with current kubectl context and commit hash (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      VALS: '{{index . (printf "VALUES_%s" .ENV)}}'
      CONTEXT:
        sh: kubectl config current-context
    cmds:
      - echo "Upgrading in context {{.CONTEXT}} with commit {{.TAG}}"
      - helm upgrade {{.REL}} {{.CHART_PATH}} --namespace {{.NS}} -f {{.CHART_PATH}}/{{.VALS}} --set image.tag={{.TAG}} --set pdfgen.image.tag={{.TAG}} --kube-context={{.CONTEXT}}

  helm-install-or-upgrade:
    desc: "Install or upgrade with current kubectl context and commit hash (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      VALS: '{{index . (printf "VALUES_%s" .ENV)}}'
      CONTEXT:
        sh: kubectl config current-context
    cmds:
      - echo "Installing/upgrading to context {{.CONTEXT}} with commit {{.TAG}}"
      - helm upgrade --install {{.REL}} {{.CHART_PATH}} --namespace {{.NS}} --create-namespace -f {{.CHART_PATH}}/{{.VALS}} --set image.tag={{.TAG}} --set pdfgen.image.tag={{.TAG}} --kube-context={{.CONTEXT}}

  # Development tasks
  dev:
    desc: Start frontend and backend in development mode (kills stale servers first)
    deps:
      - task: frontend-deps
        silent: true
    cmds:
      - task: kill-dev
      - ./scripts/dev-watch.sh

  dev-browser:
    desc: Start frontend and backend in development mode and open browser
    deps:
      - task: frontend-deps
        silent: true
    cmds:
      - task: kill-dev
      - sleep 3 && open http://localhost:5173 &
      - ./scripts/dev-watch.sh

  dev-parallel-with-browser:
    desc: Run frontend, backend, and open browser in parallel (no stale-kill)
    deps:
      - task: frontend
      - task: backend
      - task: open-browser

  open-browser:
    desc: Wait for dev servers to start, then open browser
    cmds:
      - sleep 3
      - open http://localhost:5173

  frontend-deps:
    desc: Install frontend dependencies if needed
    dir: carpaintr-front
    status:
      - test -d node_modules
    cmds:
      - npm install

  dev-parallel:
    desc: Run frontend and backend in parallel
    deps:
      - task: frontend
      - task: backend

  frontend:
    desc: Start frontend development server
    dir: carpaintr-front
    cmds:
      - npm run dev

  backend:
    desc: Start backend with hot reload
    dir: backend-service-rust
    cmds:
      - cargo watch -x run

  kill-dev:
    desc: Kill all stale dev servers (backend :8080, frontend :5173)
    cmds:
      - echo "Stopping stale dev servers..."
      - lsof -ti :8080 | xargs kill -9 2>/dev/null && echo "  Killed stale backend (:8080)" || echo "  No stale backend on :8080"
      - lsof -ti :5173 | xargs kill -9 2>/dev/null && echo "  Killed stale frontend (:5173)" || echo "  No stale frontend on :5173"
      - pkill -f "cargo.watch" 2>/dev/null && echo "  Killed cargo-watch" || true
      - echo "Done."

  # Integration testing tasks
  test:setup:
    desc: Setup integration test environment
    dir: backend-integration-tests
    cmds:
      - task setup

  test:
    desc: Run integration tests
    dir: backend-integration-tests
    cmds:
      - task test

  test:auth:
    desc: Run authentication integration tests
    dir: backend-integration-tests
    cmds:
      - task test:auth

  test:admin:
    desc: Run admin integration tests
    dir: backend-integration-tests
    cmds:
      - task test:admin

  test:cov:
    desc: Run integration tests with coverage
    dir: backend-integration-tests
    cmds:
      - task test:cov

  test:check:
    desc: Check if backend is running before tests
    dir: backend-integration-tests
    cmds:
      - task check-backend

  # Database management tasks
  db-reset:
    desc: "Reset database by deleting PVC (ENV=dev|staging, default: dev) - WARNING: DESTRUCTIVE - PRODUCTION BLOCKED"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    preconditions:
      - sh: '[ "{{.ENV}}" != "prod" ]'
        msg: "BLOCKED - Database reset is not allowed on production environment. This is a safety measure to prevent data loss."
    cmds:
      - echo "WARNING - This will DELETE ALL DATA in {{.ENV}} environment!"
      - echo "Namespace - {{.NS}}"
      - echo "PVC - autolab-api-storage-{{.REL}}-autolab-api-0"
      - echo "Press Ctrl+C within 5 seconds to cancel..."
      - sleep 5
      - echo "Scaling down StatefulSet..."
      - kubectl scale statefulset/{{.REL}}-autolab-api --replicas=0 -n {{.NS}}
      - echo "Waiting for pod to terminate..."
      - kubectl wait --for=delete pod/{{.REL}}-autolab-api-0 -n {{.NS}} --timeout=60s || true
      - echo "Deleting PVC..."
      - kubectl delete pvc autolab-api-storage-{{.REL}}-autolab-api-0 -n {{.NS}}
      - echo "Scaling up StatefulSet..."
      - kubectl scale statefulset/{{.REL}}-autolab-api --replicas=1 -n {{.NS}}
      - echo "Waiting for pod to be ready..."
      - kubectl wait --for=condition=ready pod/{{.REL}}-autolab-api-0 -n {{.NS}} --timeout=120s
      - echo "Database reset complete! New empty database created."

  db-reset-dev:
    desc: Reset dev database (autolab-dev namespace) - WARNING DESTRUCTIVE
    cmds:
      - task: db-reset
        vars: {ENV: dev}

  db-reset-staging:
    desc: Reset staging database (autolab-staging namespace) - WARNING DESTRUCTIVE
    cmds:
      - task: db-reset
        vars: {ENV: staging}

  db-reset-prod-force:
    desc: "DANGEROUS - Force reset production database (requires CONFIRM_PROD=yes)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" "prod")}}'
      REL: '{{index . (printf "RELEASE_%s" "prod")}}'
    preconditions:
      - sh: '[ "{{.CONFIRM_PROD}}" = "yes" ]'
        msg: "BLOCKED - You must set CONFIRM_PROD=yes to reset production database. Example: task db-reset-prod-force CONFIRM_PROD=yes"
    cmds:
      - echo "CRITICAL WARNING - You are about to DELETE ALL PRODUCTION DATA!"
      - echo "Namespace - {{.NS}}"
      - echo "PVC - autolab-api-storage-{{.REL}}-autolab-api-0"
      - echo "This action is IRREVERSIBLE and will cause DOWNTIME!"
      - echo "Press Ctrl+C within 10 seconds to cancel..."
      - sleep 10
      - echo "Last chance - Press Ctrl+C within 5 seconds..."
      - sleep 5
      - echo "Scaling down StatefulSet..."
      - kubectl scale statefulset/{{.REL}}-autolab-api --replicas=0 -n {{.NS}}
      - echo "Waiting for pod to terminate..."
      - kubectl wait --for=delete pod/{{.REL}}-autolab-api-0 -n {{.NS}} --timeout=60s || true
      - echo "Deleting PVC..."
      - kubectl delete pvc autolab-api-storage-{{.REL}}-autolab-api-0 -n {{.NS}}
      - echo "Scaling up StatefulSet..."
      - kubectl scale statefulset/{{.REL}}-autolab-api --replicas=1 -n {{.NS}}
      - echo "Waiting for pod to be ready..."
      - kubectl wait --for=condition=ready pod/{{.REL}}-autolab-api-0 -n {{.NS}} --timeout=120s
      - echo "Production database reset complete. All data has been deleted."

  db-backup:
    desc: "Create manual backup now (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      TIMESTAMP:
        sh: date +%s
    cmds:
      - echo "Creating manual backup in {{.NS}}..."
      - kubectl create job --from=cronjob/{{.REL}}-autolab-api-backup manual-backup-{{.TIMESTAMP}} -n {{.NS}}
      - echo "Backup job created - manual-backup-{{.TIMESTAMP}}"
      - echo "Check status with - kubectl logs -n {{.NS}} job/manual-backup-{{.TIMESTAMP}} -f"

  db-backup-dev:
    desc: Create manual backup of dev database
    cmds:
      - task: db-backup
        vars: {ENV: dev}

  db-list-backups:
    desc: "List available backups (ENV=dev|staging|prod, default: dev)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      BACKUP_PVC: "{{.REL}}-autolab-api-backup"
    cmds:
      - echo "Backups in {{.NS}} (PVC {{.BACKUP_PVC}})"
      - |
        kubectl run backup-lister-$(date +%s) --rm -i --restart=Never --image=busybox:1.36 -n {{.NS}} --overrides='
        {
          "spec": {
            "containers": [{
              "name": "backup-lister",
              "image": "busybox:1.36",
              "command": ["ls", "-lh", "/backups"],
              "volumeMounts": [{
                "name": "backup-volume",
                "mountPath": "/backups"
              }]
            }],
            "volumes": [{
              "name": "backup-volume",
              "persistentVolumeClaim": {
                "claimName": "{{.BACKUP_PVC}}"
              }
            }]
          }
        }' 2>/dev/null || echo "Error accessing backup volume"

  db-list-backups-dev:
    desc: List dev backups
    cmds:
      - task: db-list-backups
        vars: {ENV: dev}

  db-restore:
    desc: "Restore database from backup (ENV=dev|staging|prod, BACKUP_FILE=filename)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
    preconditions:
      - sh: '[ -n "{{.BACKUP_FILE}}" ]'
        msg: "BACKUP_FILE is required. Example: task db-restore ENV=dev BACKUP_FILE=autolab-backup-20260209_120000.tar.gz"
    cmds:
      - echo "Restoring {{.BACKUP_FILE}} in {{.NS}}..."
      - ./scripts/restore-from-backup.sh "{{.BACKUP_FILE}}" "{{.NS}}" "{{.REL}}"

  db-restore-dev:
    desc: "Restore dev database from backup (BACKUP_FILE=filename required)"
    preconditions:
      - sh: '[ -n "{{.BACKUP_FILE}}" ]'
        msg: "BACKUP_FILE is required. Example: task db-restore-dev BACKUP_FILE=autolab-backup-20260209_120000.tar.gz"
    cmds:
      - task: db-restore
        vars:
          ENV: dev
          BACKUP_FILE: "{{.BACKUP_FILE}}"

  db-restore-staging:
    desc: "Restore staging database from backup (BACKUP_FILE=filename required)"
    preconditions:
      - sh: '[ -n "{{.BACKUP_FILE}}" ]'
        msg: "BACKUP_FILE is required. Example: task db-restore-staging BACKUP_FILE=autolab-backup-20260209_120000.tar.gz"
    cmds:
      - task: db-restore
        vars:
          ENV: staging
          BACKUP_FILE: "{{.BACKUP_FILE}}"

  db-restore-prod:
    desc: "Restore production database from backup (BACKUP_FILE=filename + CONFIRM_PROD=yes required)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" "prod")}}'
      REL: '{{index . (printf "RELEASE_%s" "prod")}}'
    preconditions:
      - sh: '[ -n "{{.BACKUP_FILE}}" ]'
        msg: "BACKUP_FILE is required. Example: task db-restore-prod BACKUP_FILE=autolab-backup-20260209_120000.tar.gz CONFIRM_PROD=yes"
      - sh: '[ "{{.CONFIRM_PROD}}" = "yes" ]'
        msg: "CONFIRM_PROD=yes is required for production restore. Example: task db-restore-prod BACKUP_FILE=autolab-backup-20260209_120000.tar.gz CONFIRM_PROD=yes"
    cmds:
      - echo "WARNING - Restoring PRODUCTION database from {{.BACKUP_FILE}}"
      - echo "This will cause downtime and overwrite all current data!"
      - ./scripts/restore-from-backup.sh "{{.BACKUP_FILE}}" "{{.NS}}" "{{.REL}}"

  db-restore-from-local:
    desc: "Upload and restore from local backup file (ENV=dev|staging|prod, LOCAL_FILE=path to .tar.gz or .zip)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      BACKUP_PVC: "{{.REL}}-autolab-api-backup"
      TEMP_POD:
        sh: echo "backup-uploader-$(date +%s)"
      FILENAME:
        sh: basename "{{.LOCAL_FILE}}"
    preconditions:
      - sh: '[ -n "{{.LOCAL_FILE}}" ]'
        msg: "LOCAL_FILE is required. Example: task db-restore-from-local ENV=dev LOCAL_FILE=./my-backup.tar.gz"
      - sh: '[ -f "{{.LOCAL_FILE}}" ]'
        msg: "File {{.LOCAL_FILE}} does not exist"
    cmds:
      - echo "═══════════════════════════════════════════════════════════"
      - echo "Restore from Local Backup File"
      - echo "═══════════════════════════════════════════════════════════"
      - echo "Environment {{.ENV}} ({{.NS}})"
      - echo "Local file {{.LOCAL_FILE}}"
      - |
        echo "File size: $(du -h "{{.LOCAL_FILE}}" | cut -f1)"
      - echo ""
      - echo "Step 1/2 - Uploading backup file to cluster..."
      - |
        kubectl run {{.TEMP_POD}} --image=busybox:1.36 -n {{.NS}} --restart=Never --overrides='
        {
          "spec": {
            "containers": [{
              "name": "uploader",
              "image": "busybox:1.36",
              "command": ["sh", "-c", "sleep 120"],
              "volumeMounts": [{
                "name": "backup-volume",
                "mountPath": "/backups"
              }]
            }],
            "volumes": [{
              "name": "backup-volume",
              "persistentVolumeClaim": {
                "claimName": "{{.BACKUP_PVC}}"
              }
            }]
          }
        }' 2>/dev/null || true
      - kubectl wait --for=condition=ready pod/{{.TEMP_POD}} -n {{.NS}} --timeout=30s
      - kubectl cp "{{.LOCAL_FILE}}" {{.NS}}/{{.TEMP_POD}}:/backups/{{.FILENAME}}
      - kubectl exec -n {{.NS}} {{.TEMP_POD}} -- ls -lh /backups/{{.FILENAME}}
      - kubectl delete pod {{.TEMP_POD}} -n {{.NS}} --ignore-not-found=true
      - echo "✓ Upload complete"
      - echo ""
      - echo "Step 2/2 - Starting restore process..."
      - ./scripts/restore-from-backup.sh "{{.FILENAME}}" "{{.NS}}" "{{.REL}}"

  db-restore-from-local-dev:
    desc: "Upload and restore from local backup file to dev (LOCAL_FILE=path required)"
    preconditions:
      - sh: '[ -n "{{.LOCAL_FILE}}" ]'
        msg: "LOCAL_FILE is required. Example: task db-restore-from-local-dev LOCAL_FILE=./my-backup.tar.gz"
    cmds:
      - task: db-restore-from-local
        vars:
          ENV: dev
          LOCAL_FILE: "{{.LOCAL_FILE}}"

  db-restore-from-local-staging:
    desc: "Upload and restore from local backup file to staging (LOCAL_FILE=path required)"
    preconditions:
      - sh: '[ -n "{{.LOCAL_FILE}}" ]'
        msg: "LOCAL_FILE is required. Example: task db-restore-from-local-staging LOCAL_FILE=./my-backup.tar.gz"
    cmds:
      - task: db-restore-from-local
        vars:
          ENV: staging
          LOCAL_FILE: "{{.LOCAL_FILE}}"

  db-restore-from-local-prod:
    desc: "Upload and restore from local backup file to production (LOCAL_FILE=path + CONFIRM_PROD=yes required)"
    preconditions:
      - sh: '[ -n "{{.LOCAL_FILE}}" ]'
        msg: "LOCAL_FILE is required. Example: task db-restore-from-local-prod LOCAL_FILE=./my-backup.tar.gz CONFIRM_PROD=yes"
      - sh: '[ "{{.CONFIRM_PROD}}" = "yes" ]'
        msg: "CONFIRM_PROD=yes is required for production restore. Example: task db-restore-from-local-prod LOCAL_FILE=./my-backup.tar.gz CONFIRM_PROD=yes"
    cmds:
      - echo "WARNING - Restoring PRODUCTION from local file {{.LOCAL_FILE}}"
      - echo "This will cause downtime and overwrite all current data!"
      - task: db-restore-from-local
        vars:
          ENV: prod
          LOCAL_FILE: "{{.LOCAL_FILE}}"

  db-download-backup:
    desc: "Download backup file from cluster to local machine (ENV=dev|staging|prod, BACKUP_FILE=filename)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      BACKUP_PVC: "{{.REL}}-autolab-api-backup"
      LOCAL_DIR: "./backups"
      TEMP_POD: "backup-downloader-{{.BACKUP_FILE}}"
    preconditions:
      - sh: '[ -n "{{.BACKUP_FILE}}" ]'
        msg: "BACKUP_FILE is required. Example: task db-download-backup ENV=dev BACKUP_FILE=autolab-backup-20260209_120000.tar.gz"
    cmds:
      - mkdir -p {{.LOCAL_DIR}}
      - echo "Downloading {{.BACKUP_FILE}} from {{.NS}} backup volume..."
      - |
        kubectl run {{.TEMP_POD}} --image=busybox:1.36 -n {{.NS}} --restart=Never --overrides='
        {
          "spec": {
            "containers": [{
              "name": "downloader",
              "image": "busybox:1.36",
              "command": ["sh", "-c", "sleep 60"],
              "volumeMounts": [{
                "name": "backup-volume",
                "mountPath": "/backups",
                "readOnly": true
              }]
            }],
            "volumes": [{
              "name": "backup-volume",
              "persistentVolumeClaim": {
                "claimName": "{{.BACKUP_PVC}}"
              }
            }]
          }
        }' 2>/dev/null || true
      - kubectl wait --for=condition=ready pod/{{.TEMP_POD}} -n {{.NS}} --timeout=30s
      - kubectl cp {{.NS}}/{{.TEMP_POD}}:/backups/{{.BACKUP_FILE}} {{.LOCAL_DIR}}/{{.BACKUP_FILE}}
      - kubectl delete pod {{.TEMP_POD}} -n {{.NS}} --ignore-not-found=true
      - echo "Downloaded to {{.LOCAL_DIR}}/{{.BACKUP_FILE}}"
      - ls -lh {{.LOCAL_DIR}}/{{.BACKUP_FILE}}

  db-upload-backup:
    desc: "Upload local backup file to cluster (ENV=dev|staging|prod, LOCAL_FILE=path)"
    vars:
      NS: '{{index . (printf "NAMESPACE_%s" .ENV)}}'
      REL: '{{index . (printf "RELEASE_%s" .ENV)}}'
      BACKUP_PVC: "{{.REL}}-autolab-api-backup"
      TEMP_POD:
        sh: echo "backup-uploader-$(date +%s)"
      FILENAME:
        sh: basename "{{.LOCAL_FILE}}"
    preconditions:
      - sh: '[ -n "{{.LOCAL_FILE}}" ]'
        msg: "LOCAL_FILE is required. Example: task db-upload-backup ENV=dev LOCAL_FILE=./backups/autolab-backup-20260209_120000.tar.gz"
      - sh: '[ -f "{{.LOCAL_FILE}}" ]'
        msg: "File {{.LOCAL_FILE}} does not exist"
    cmds:
      - echo "Uploading {{.LOCAL_FILE}} to {{.NS}} backup volume..."
      - |
        kubectl run {{.TEMP_POD}} --image=busybox:1.36 -n {{.NS}} --restart=Never --overrides='
        {
          "spec": {
            "containers": [{
              "name": "uploader",
              "image": "busybox:1.36",
              "command": ["sh", "-c", "sleep 60"],
              "volumeMounts": [{
                "name": "backup-volume",
                "mountPath": "/backups"
              }]
            }],
            "volumes": [{
              "name": "backup-volume",
              "persistentVolumeClaim": {
                "claimName": "{{.BACKUP_PVC}}"
              }
            }]
          }
        }' 2>/dev/null || true
      - kubectl wait --for=condition=ready pod/{{.TEMP_POD}} -n {{.NS}} --timeout=30s
      - kubectl cp {{.LOCAL_FILE}} {{.NS}}/{{.TEMP_POD}}:/backups/{{.FILENAME}}
      - echo "Upload complete. Verifying..."
      - kubectl exec -n {{.NS}} {{.TEMP_POD}} -- ls -lh /backups/{{.FILENAME}}
      - kubectl delete pod {{.TEMP_POD}} -n {{.NS}} --ignore-not-found=true
      - echo "File uploaded successfully to cluster backup volume"
